 </head>
 <body class="h-full bg-leaf-50 text-gray-800">
  <div id="app" class="h-full w-full overflow-auto">
   <!-- Header -->
   <header class="bg-white border-b border-leaf-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
     <div class="flex items-center gap-2">
      <a href="https://tkbnkhoahung.github.io/tkbnk2526hs/" target="_blank" rel="noopener noreferrer" class="p-2 rounded-lg bg-leaf-100 text-leaf-700 hover:bg-leaf-200 transition"> <i data-lucide="home" class="w-5 h-5"></i> </a>
      <div>
       <h1 id="page-title" class="text-lg font-bold text-leaf-800 leading-tight">Thời Khóa Biểu Tự Chọn Lớp 12</h1>
       <p class="text-xs text-leaf-600">Áp dụng từ ngày 4/5/2026</p>
      </div>
     </div><button onclick="exportWallpaper()" class="flex items-center gap-1 px-3 py-2 bg-leaf-600 text-white rounded-lg text-sm font-medium hover:bg-leaf-700 transition"> <i data-lucide="image" class="w-4 h-4"></i> <span class="hidden sm:inline">Xuất hình</span> </button>
    </div>
   </header><!-- Stats -->
   <div id="stats-section" class="max-w-5xl mx-auto px-4 py-3">
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
     <div class="bg-white rounded-xl p-3 border border-leaf-200 text-center">
      <div class="text-2xl font-bold text-leaf-700" id="stat-students">
       -
      </div>
      <div class="text-xs text-gray-500">
       Học sinh
      </div>
     </div>
     <div class="bg-white rounded-xl p-3 border border-leaf-200 text-center">
      <div class="text-2xl font-bold text-leaf-700" id="stat-classes">
       -
      </div>
      <div class="text-xs text-gray-500">
       Mã lớp
      </div>
     </div>
     <div class="bg-white rounded-xl p-3 border border-leaf-200 text-center">
      <div class="text-2xl font-bold text-leaf-700" id="stat-rooms">
       -
      </div>
      <div class="text-xs text-gray-500">
       Phòng
      </div>
     </div>
     <div class="bg-white rounded-xl p-3 border border-leaf-200 text-center">
      <div class="text-2xl font-bold text-leaf-700" id="stat-teachers">
       -
      </div>
      <div class="text-xs text-gray-500">
       Giáo viên
      </div>
     </div>
    </div>
   </div><!-- Tabs -->
   <div class="max-w-5xl mx-auto px-4">
    <div class="flex gap-1 bg-white rounded-xl p-1 border border-leaf-200 overflow-x-auto">
     <button onclick="switchTab('student')" id="tab-student" class="tab-btn flex-1 px-3 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap tab-active">Học sinh</button> <button onclick="switchTab('class')" id="tab-class" class="tab-btn flex-1 px-3 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap text-gray-600 hover:bg-leaf-100">Mã lớp</button> <button onclick="switchTab('room')" id="tab-room" class="tab-btn flex-1 px-3 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap text-gray-600 hover:bg-leaf-100">Phòng</button> <button onclick="switchTab('teacher')" id="tab-teacher" class="tab-btn flex-1 px-3 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap text-gray-600 hover:bg-leaf-100">Giáo viên</button>
    </div>
   </div><!-- Search + Dropdown -->
   <div class="max-w-5xl mx-auto px-4 py-3">
    <div class="flex gap-2">
     <div class="relative flex-1">
      <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i> <input id="search-input" type="text" placeholder="Tìm kiếm..." class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-leaf-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-leaf-400 focus:border-transparent" oninput="onSearch(this.value)"> <button id="clear-btn" class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="clearSearch()"> <i data-lucide="x" class="w-4 h-4"></i> </button> <!-- Suggestions -->
      <div id="suggestions" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-leaf-200 rounded-xl shadow-lg max-h-60 overflow-auto z-40"></div>
     </div><select id="dropdown-select" onchange="onDropdownChange(this.value)" class="px-3 py-2.5 rounded-xl border border-leaf-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-leaf-400 max-w-[180px]"> <option value="">Chọn...</option> </select>
    </div>
   </div><!-- Content -->
   <div id="content-area" class="max-w-5xl mx-auto px-4 pb-6 fade-in">
    <div id="loading" class="text-center py-12">
     <div class="inline-block w-8 h-8 border-3 border-leaf-300 border-t-leaf-600 rounded-full animate-spin"></div>
     <p class="mt-3 text-sm text-gray-500">Đang tải dữ liệu...</p>
    </div>
    <div id="results" class="hidden"></div>
   </div><!-- Export CSV -->
   <div class="max-w-5xl mx-auto px-4 pb-8">
    <button onclick="exportCSV()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-white border border-leaf-200 rounded-xl text-sm font-medium text-leaf-700 hover:bg-leaf-50 transition"> <i data-lucide="download" class="w-4 h-4"></i> Xuất CSV/Excel toàn bộ thông tin </button>
   </div>
  </div>
  <canvas id="export-canvas" width="1080" height="1920"></canvas>
  <script>
// Global state
let allData = [];
let currentTab = 'student';
let students = [], classes = [], rooms = [], teachers = [];

const SHEET_ID = '14QJ8ALOZYFfLpuMsIaMRTzmMgvES8EZQsWSJeyqW160';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

// Parse data
async function fetchData() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;
    const cols = json.table.cols;
    
    // Skip header row (first row is column names)
    allData = [];
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r.c || !r.c[0]) continue;
      const cells = r.c.map(c => c ? (c.v || '').toString().trim() : '');
      if (!cells[0]) continue;
      
      // Parse: lớp thực, tên HS, môn1, GV1, mã lớp1, phòng1, môn2, GV2, mã lớp2, phòng2
      const entry = {
        realClass: cells[0] || '',
        studentName: cells[1] || '',
        subject1: cells[2] || '',
        teacher1: cells[3] || '',
        classCode1: cells[4] || '',
        room1: cells[5] || '',
        subject2: cells[6] || '',
        teacher2: cells[7] || '',
        classCode2: cells[8] || '',
        room2: cells[9] || ''
      };
      if (entry.studentName) allData.push(entry);
    }

    // Build indexes
    const sSet = new Set(), cSet = new Set(), rSet = new Set(), tSet = new Set();
    allData.forEach(d => {
      sSet.add(d.studentName);
      if (d.classCode1) cSet.add(d.classCode1);
      if (d.classCode2) cSet.add(d.classCode2);
      if (d.room1) rSet.add(d.room1);
      if (d.room2) rSet.add(d.room2);
      if (d.teacher1) tSet.add(d.teacher1);
      if (d.teacher2) tSet.add(d.teacher2);
    });
    students = [...sSet].sort();
    classes = [...cSet].sort();
    rooms = [...rSet].sort();
    teachers = [...tSet].sort();

    // Stats
    document.getElementById('stat-students').textContent = students.length;
    document.getElementById('stat-classes').textContent = classes.length;
    document.getElementById('stat-rooms').textContent = rooms.length;
    document.getElementById('stat-teachers').textContent = teachers.length;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    
    populateDropdown();
    // Show first item by default
    if (students.length > 0) {
      document.getElementById('dropdown-select').value = students[0];
      showResult(students[0]);
    }
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p class="text-red-500 text-sm">Lỗi tải dữ liệu. Vui lòng thử lại.</p>`;
    console.error(e);
  }
}

function populateDropdown() {
  const sel = document.getElementById('dropdown-select');
  let list = [];
  if (currentTab === 'student') list = students;
  else if (currentTab === 'class') list = classes;
  else if (currentTab === 'room') list = rooms;
  else list = teachers;
  
  sel.innerHTML = list.map(item => `<option value="${item}">${item}</option>`).join('');
  if (list.length > 0) {
    sel.value = list[0];
    showResult(list[0]);
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('tab-active');
    b.classList.add('text-gray-600', 'hover:bg-leaf-100');
  });
  const active = document.getElementById('tab-' + tab);
  active.classList.add('tab-active');
  active.classList.remove('text-gray-600', 'hover:bg-leaf-100');
  
  const placeholders = { student:'Tìm học sinh...', class:'Tìm mã lớp...', room:'Tìm phòng...', teacher:'Tìm giáo viên...' };
  document.getElementById('search-input').placeholder = placeholders[tab];
  document.getElementById('search-input').value = '';
  document.getElementById('suggestions').classList.add('hidden');
  document.getElementById('clear-btn').classList.add('hidden');
  
  populateDropdown();
}

function onSearch(val) {
  const sug = document.getElementById('suggestions');
  const clearBtn = document.getElementById('clear-btn');
  if (!val.trim()) {
    sug.classList.add('hidden');
    clearBtn.classList.add('hidden');
    populateDropdown();
    return;
  }
  clearBtn.classList.remove('hidden');
  
  let list = [];
  if (currentTab === 'student') list = students;
  else if (currentTab === 'class') list = classes;
  else if (currentTab === 'room') list = rooms;
  else list = teachers;
  
  const q = val.toLowerCase();
  const matches = list.filter(i => i.toLowerCase().includes(q));
  
  if (matches.length === 0) {
    sug.innerHTML = '<div class="px-4 py-3 text-sm text-gray-400">Không tìm thấy</div>';
  } else {
    sug.innerHTML = matches.slice(0, 20).map(m => 
      `<div class="px-4 py-2.5 text-sm cursor-pointer hover:bg-leaf-50 transition" onclick="selectItem('${m.replace(/'/g, "\\'")}')">${m}</div>`
    ).join('');
  }
  sug.classList.remove('hidden');
}

function selectItem(val) {
  document.getElementById('search-input').value = val;
  document.getElementById('suggestions').classList.add('hidden');
  document.getElementById('dropdown-select').value = val;
  showResult(val);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('suggestions').classList.add('hidden');
  document.getElementById('clear-btn').classList.add('hidden');
  populateDropdown();
}

function onDropdownChange(val) {
  if (val) {
    document.getElementById('search-input').value = '';
    document.getElementById('suggestions').classList.add('hidden');
    showResult(val);
  }
}

function showResult(val) {
  const results = document.getElementById('results');
  let html = '';
  
  if (currentTab === 'student') {
    const entries = allData.filter(d => d.studentName === val);
    if (entries.length === 0) { results.innerHTML = '<p class="text-center text-gray-400 py-8">Không có dữ liệu</p>'; return; }
    const e = entries[0];
    html = `
      <div class="fade-in">
        <div class="bg-white rounded-2xl border border-leaf-200 overflow-hidden card-hover">
          <div class="bg-leaf-600 px-4 py-3">
            <h2 class="text-white font-semibold text-lg">${e.studentName}</h2>
            <p class="text-leaf-100 text-xs">Lớp ${e.realClass}</p>
          </div>
          <div class="p-4 space-y-3">
            ${renderPeriod('Tiết 1-2', e.subject1, e.teacher1, e.classCode1, e.room1)}
            ${renderPeriod('Tiết 3-4', e.subject2, e.teacher2, e.classCode2, e.room2)}
          </div>
        </div>
      </div>`;
  } else if (currentTab === 'class') {
    const entries = allData.filter(d => d.classCode1 === val || d.classCode2 === val);
    if (entries.length === 0) { results.innerHTML = '<p class="text-center text-gray-400 py-8">Không có dữ liệu</p>'; return; }
    // Find teacher and room for this class code
    let teacher = '', room = '', subject = '';
    for (const e of entries) {
      if (e.classCode1 === val) { teacher = e.teacher1; room = e.room1; subject = e.subject1; break; }
      if (e.classCode2 === val) { teacher = e.teacher2; room = e.room2; subject = e.subject2; break; }
    }
    const studentList = entries.map(e => `${e.studentName} (${e.realClass})`);
    html = `
      <div class="fade-in">
        <div class="bg-white rounded-2xl border border-leaf-200 overflow-hidden card-hover">
          <div class="bg-leaf-600 px-4 py-3">
            <h2 class="text-white font-semibold text-lg">${val} - ${subject}</h2>
            <p class="text-leaf-100 text-xs">GV: ${teacher} · Phòng: ${room}</p>
          </div>
          <div class="p-4">
            <p class="text-xs text-gray-500 mb-2">${studentList.length} học sinh</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
              ${studentList.map((s,i) => `<div class="text-sm px-3 py-1.5 bg-leaf-50 rounded-lg">${i+1}. ${s}</div>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
  } else if (currentTab === 'room') {
    // Room: who teaches there, which period, how many students
    const period1 = allData.filter(d => d.room1 === val);
    const period2 = allData.filter(d => d.room2 === val);
    html = `<div class="fade-in space-y-3">`;
    if (period1.length > 0) {
      const t = period1[0].teacher1;
      const s = period1[0].subject1;
      const cc = period1[0].classCode1;
      html += `
        <div class="bg-white rounded-2xl border border-leaf-200 overflow-hidden card-hover">
          <div class="bg-leaf-600 px-4 py-3">
            <h2 class="text-white font-semibold">Phòng ${val} - Tiết 1-2</h2>
          </div>
          <div class="p-4">
            <div class="flex items-center gap-3 text-sm">
              <span class="px-2 py-1 bg-leaf-100 text-leaf-700 rounded-lg font-medium">${s}</span>
              <span>GV: ${t}</span>
              <span>Mã: ${cc}</span>
              <span class="ml-auto text-gray-500">${period1.length} HS</span>
            </div>
          </div>
        </div>`;
    }
    if (period2.length > 0) {
      const t = period2[0].teacher2;
      const s = period2[0].subject2;
      const cc = period2[0].classCode2;
      html += `
        <div class="bg-white rounded-2xl border border-leaf-200 overflow-hidden card-hover">
          <div class="bg-leaf-600 px-4 py-3">
            <h2 class="text-white font-semibold">Phòng ${val} - Tiết 3-4</h2>
          </div>
          <div class="p-4">
            <div class="flex items-center gap-3 text-sm">
              <span class="px-2 py-1 bg-leaf-100 text-leaf-700 rounded-lg font-medium">${s}</span>
              <span>GV: ${t}</span>
              <span>Mã: ${cc}</span>
              <span class="ml-auto text-gray-500">${period2.length} HS</span>
            </div>
          </div>
        </div>`;
    }
    html += `</div>`;
  } else if (currentTab === 'teacher') {
    const p1 = allData.filter(d => d.teacher1 === val);
    const p2 = allData.filter(d => d.teacher2 === val);
    html = `<div class="fade-in space-y-3">`;
    if (p1.length > 0) {
      const codes1 = [...new Set(p1.map(d => d.classCode1))];
      html += `
        <div class="bg-white rounded-2xl border border-leaf-200 overflow-hidden card-hover">
          <div class="bg-leaf-600 px-4 py-3">
            <h2 class="text-white font-semibold">${val}</h2>
            <p class="text-leaf-100 text-xs">Tiết 1-2</p>
          </div>
          <div class="p-4 space-y-2">
            ${codes1.map(cc => {
              const items = p1.filter(d => d.classCode1 === cc);
              return `<div class="p-3 bg-leaf-50 rounded-xl">
                <div class="flex items-center justify-between text-sm">
                  <span class="font-medium text-leaf-800">${cc} - ${items[0].subject1}</span>
                  <span class="text-gray-500">Phòng ${items[0].room1} · ${items.length} HS</span>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }
    if (p2.length > 0) {
      const codes2 = [...new Set(p2.map(d => d.classCode2))];
      html += `
        <div class="bg-white rounded-2xl border border-leaf-200 overflow-hidden card-hover">
          <div class="bg-leaf-600 px-4 py-3">
            <h2 class="text-white font-semibold">${val}</h2>
            <p class="text-leaf-100 text-xs">Tiết 3-4</p>
          </div>
          <div class="p-4 space-y-2">
            ${codes2.map(cc => {
              const items = p2.filter(d => d.classCode2 === cc);
              return `<div class="p-3 bg-leaf-50 rounded-xl">
                <div class="flex items-center justify-between text-sm">
                  <span class="font-medium text-leaf-800">${cc} - ${items[0].subject2}</span>
                  <span class="text-gray-500">Phòng ${items[0].room2} · ${items.length} HS</span>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }
    html += `</div>`;
  }
  
  results.innerHTML = html;
}

function renderPeriod(label, subject, teacher, classCode, room) {
  if (!subject) return '';
  return `
    <div class="flex items-center gap-3 p-3 bg-leaf-50 rounded-xl">
      <div class="w-16 text-center">
        <div class="text-xs text-gray-500">${label}</div>
        <div class="font-bold text-leaf-700 text-lg">${subject}</div>
      </div>
      <div class="h-8 w-px bg-leaf-200"></div>
      <div class="flex-1 text-sm space-y-0.5">
        <div class="font-medium text-gray-800">${teacher}</div>
        <div class="text-gray-500">Mã: ${classCode} · Phòng: ${room}</div>
      </div>
    </div>`;
}

function exportWallpaper() {
  const canvas = document.getElementById('export-canvas');
  const ctx = canvas.getContext('2d');
  const w = 1080, h = 1920;
  
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#14532d');
  grad.addColorStop(1, '#166534');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  
  // Get selected item
  const sel = document.getElementById('dropdown-select').value;
  if (!sel || currentTab !== 'student') {
    // Just export current student from dropdown or first
    const target = sel || (students.length > 0 ? students[0] : '');
    if (!target) return;
    drawStudentWallpaper(ctx, target, w, h);
  } else {
    drawStudentWallpaper(ctx, sel, w, h);
  }
  
  // Download
  const link = document.createElement('a');
  link.download = `TKB_${sel || 'export'}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function drawStudentWallpaper(ctx, name, w, h) {
  const entries = allData.filter(d => d.studentName === name);
  if (entries.length === 0) return;
  const e = entries[0];
  
  // Title
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px Be Vietnam Pro, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('THỜI KHÓA BIỂU TỰ CHỌN', w/2, 200);
  ctx.font = '32px Be Vietnam Pro, sans-serif';
  ctx.fillStyle = '#86efac';
  ctx.fillText('Áp dụng từ 4/5/2026', w/2, 260);
  
  // Student info
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 56px Be Vietnam Pro, sans-serif';
  ctx.fillText(e.studentName, w/2, 400);
  ctx.font = '36px Be Vietnam Pro, sans-serif';
  ctx.fillStyle = '#bbf7d0';
  ctx.fillText(`Lớp ${e.realClass}`, w/2, 460);
  
  // Period 1
  let y = 580;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, 80, y, w-160, 280, 24);
  ctx.fill();
  
  ctx.fillStyle = '#4ade80';
  ctx.font = 'bold 32px Be Vietnam Pro, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('TIẾT 1-2', 130, y + 60);
  
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 44px Be Vietnam Pro, sans-serif';
  ctx.fillText(e.subject1, 130, y + 120);
  ctx.font = '30px Be Vietnam Pro, sans-serif';
  ctx.fillStyle = '#dcfce7';
  ctx.fillText(`GV: ${e.teacher1}`, 130, y + 175);
  ctx.fillText(`Mã lớp: ${e.classCode1} · Phòng: ${e.room1}`, 130, y + 225);
  
  // Period 2
  y = 920;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  roundRect(ctx, 80, y, w-160, 280, 24);
  ctx.fill();
  
  ctx.fillStyle = '#4ade80';
  ctx.font = 'bold 32px Be Vietnam Pro, sans-serif';
  ctx.textAlign = 'left';

}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function exportCSV() {
  let csv = 'Lớp,Họ tên,Môn 1,GV 1,Mã lớp 1,Phòng 1,Môn 2,GV 2,Mã lớp 2,Phòng 2\n';
  allData.forEach(d => {

  });
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'ThoiKhoaBieu_Lop12.csv';
  link.click();
}
