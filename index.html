  <script>
const SHEET_ID='14QJ8ALOZYFfLpuMsIaMRTzmMgvES8EZQsWSJeyqW160';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

let allData=[];
let currentTab='student';
let students=new Set(),classes=new Set(),rooms=new Set(),teachers=new Set();
let studentMap={},classMap={},roomMap={},teacherMap={};

// Parse CSV
function parseCSV(text){
const lines=text.split('\n').filter(l=>l.trim());
const result=[];
for(let i=1;i<lines.length;i++){
const cols=parseCSVLine(lines[i]);
if(cols.length>=10&&cols[0].trim()){
const realClass=cols[0].trim();
const studentName=cols[1].trim();
const sub1=cols[2].trim();
const teacher1=cols[3].trim();
const code1=cols[4].trim();
const room1=cols[5].trim();
const sub2=cols[6].trim();
const teacher2=cols[7].trim();
const code2=cols[8].trim();
const room2=cols[9].trim();
if(studentName){
result.push({realClass,studentName,
s1:{subject:sub1,teacher:teacher1,code:code1,room:room1},
s2:{subject:sub2,teacher:teacher2,code:code2,room:room2}});
}
}
}
return result;
}

function parseCSVLine(line){
const result=[];let current='';let inQuotes=false;
for(let i=0;i<line.length;i++){
const c=line[i];
if(inQuotes){if(c==='"'){if(i+1<line.length&&line[i+1]==='"'){current+='"';i++}else{inQuotes=false}}else{current+=c}}
else{if(c==='"'){inQuotes=true}else if(c===','){result.push(current);current=''}else{current+=c}}
}
result.push(current);
return result;
}

function buildIndexes(){
students.clear();classes.clear();rooms.clear();teachers.clear();
studentMap={};classMap={};roomMap={};teacherMap={};
allData.forEach(d=>{
students.add(d.studentName);
if(!studentMap[d.studentName])studentMap[d.studentName]=[];
studentMap[d.studentName].push(d);
[d.s1,d.s2].forEach((s,idx)=>{
const period=idx===0?'Tiết 1-2':'Tiết 3-4';
if(s.code){
classes.add(s.code);
if(!classMap[s.code])classMap[s.code]=[];
classMap[s.code].push({...d,period,slot:s});
}
if(s.room){
rooms.add(s.room);
if(!roomMap[s.room])roomMap[s.room]=[];
roomMap[s.room].push({...d,period,slot:s});
}
if(s.teacher){
teachers.add(s.teacher);
if(!teacherMap[s.teacher])teacherMap[s.teacher]=[];
teacherMap[s.teacher].push({...d,period,slot:s});
}
});
});
}

function renderStats(){
const el=document.getElementById('stats');
const items=[
{icon:'users',label:'Học sinh',val:students.size,color:'bg-g-100 text-g-800'},
{icon:'book-open',label:'Mã lớp',val:classes.size,color:'bg-emerald-100 text-emerald-800'},
{icon:'map-pin',label:'Phòng',val:rooms.size,color:'bg-teal-100 text-teal-800'},
{icon:'briefcase',label:'Giáo viên',val:teachers.size,color:'bg-green-100 text-green-800'}
];
el.innerHTML=items.map(i=>`<div class="${i.color} rounded-xl p-3 text-center card-hover">
<div class="text-2xl font-800">${i.val}</div>
<div class="text-xs font-500 mt-1 flex items-center justify-center gap-1"><i data-lucide="${i.icon}" style="width:12px;height:12px"></i>${i.label}</div>
</div>`).join('');
lucide.createIcons();
}

function getListForTab(){
const m={student:[...students].sort(),class:[...classes].sort(),room:[...rooms].sort(),teacher:[...teachers].sort()};
return m[currentTab]||[];
}

function populateDropdown(){
const sel=document.getElementById('dropdownSelect');
const list=getListForTab();
sel.innerHTML=list.map(v=>`<option value="${v}">${v}</option>`).join('');
}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll('.tab-btn').forEach(b=>{
b.classList.remove('tab-active');
if(b.dataset.tab===tab)b.classList.add('tab-active');
});
document.getElementById('searchBox').value='';
document.getElementById('suggestions').classList.add('hidden');
populateDropdown();
const sel=document.getElementById('dropdownSelect');
if(sel.value)renderResult(sel.value);
else document.getElementById('results').innerHTML='';
const placeholders={student:'Tìm học sinh...',class:'Tìm mã lớp...',room:'Tìm phòng...',teacher:'Tìm giáo viên...'};
document.getElementById('searchBox').placeholder=placeholders[tab]||'Tìm kiếm...';
}

function onDropdownChange(){
const val=document.getElementById('dropdownSelect').value;
document.getElementById('searchBox').value='';
document.getElementById('suggestions').classList.add('hidden');
if(val)renderResult(val);
}

function onSearch(){
const q=document.getElementById('searchBox').value.trim().toLowerCase();
showSuggestions();
if(!q){
const sel=document.getElementById('dropdownSelect');
if(sel.value)renderResult(sel.value);
return;
}
}

function showSuggestions(){
const q=document.getElementById('searchBox').value.trim().toLowerCase();
const box=document.getElementById('suggestions');
if(!q){box.classList.add('hidden');return;}
const list=getListForTab().filter(v=>v.toLowerCase().includes(q));
if(!list.length){box.classList.add('hidden');return;}
box.innerHTML=list.slice(0,20).map(v=>`<div class="dropdown-item px-3 py-2 cursor-pointer text-sm" onclick="selectSuggestion('${v.replace(/'/g,"\\'")}')">${highlight(v,q)}</div>`).join('');
box.classList.remove('hidden');
}

function highlight(text,q){
const idx=text.toLowerCase().indexOf(q);
if(idx<0)return text;
return text.slice(0,idx)+'<span class="bg-g-200 font-600 rounded px-0.5">'+text.slice(idx,idx+q.length)+'</span>'+text.slice(idx+q.length);
}

function selectSuggestion(val){
document.getElementById('searchBox').value=val;
document.getElementById('suggestions').classList.add('hidden');
// sync dropdown
const sel=document.getElementById('dropdownSelect');
sel.value=val;
renderResult(val);
}

function clearSearch(){
document.getElementById('searchBox').value='';
document.getElementById('suggestions').classList.add('hidden');
const sel=document.getElementById('dropdownSelect');
if(sel.value)renderResult(sel.value);
}

function renderResult(val){
const el=document.getElementById('results');
el.innerHTML='';
if(currentTab==='student')renderStudent(val,el);
else if(currentTab==='class')renderClass(val,el);
else if(currentTab==='room')renderRoom(val,el);
else if(currentTab==='teacher')renderTeacher(val,el);
el.classList.add('fade-in');
}

function renderStudent(name,el){
const records=studentMap[name];
if(!records||!records.length){el.innerHTML=noResult();return;}
const d=records[0];
el.innerHTML=`
<div class="bg-white rounded-2xl border border-g-200 overflow-hidden shadow-sm">
<div class="bg-g-600 text-white px-4 py-3">
<div class="font-700 text-lg">${d.studentName}</div>
<div class="text-g-100 text-xs mt-0.5">Lớp ${d.realClass}</div>
</div>
<div class="divide-y divide-g-100">
${slotCard('Tiết 1-2',d.s1)}
${slotCard('Tiết 3-4',d.s2)}
</div>
</div>`;
}

function slotCard(period,s){
return`<div class="px-4 py-3 flex items-start gap-3">
<div class="bg-g-100 text-g-700 rounded-lg px-2 py-1 text-xs font-700 whitespace-nowrap mt-0.5">${period}</div>
<div class="flex-1 min-w-0">
<div class="font-700 text-g-900">${s.subject||'—'}</div>
<div class="text-xs text-gray-500 mt-0.5 space-y-0.5">
<div>👨‍🏫 ${s.teacher||'—'}</div>
<div>📋 Mã lớp: <span class="font-600 text-g-700">${s.code||'—'}</span></div>
<div>📍 Phòng: <span class="font-600 text-g-700">${s.room||'—'}</span></div>
</div>
</div>
</div>`;
}

function renderClass(code,el){
const records=classMap[code];
if(!records||!records.length){el.innerHTML=noResult();return;}
const r0=records[0];
const studentList=[...new Set(records.map(r=>r.studentName))].sort();
el.innerHTML=`
<div class="bg-white rounded-2xl border border-g-200 overflow-hidden shadow-sm">
<div class="bg-g-600 text-white px-4 py-3">
<div class="font-700 text-lg">${code} — ${r0.slot.subject}</div>
<div class="text-g-100 text-xs mt-0.5">👨‍🏫 ${r0.slot.teacher} · 📍 ${r0.slot.room} · ${r0.period}</div>
</div>
<div class="px-4 py-3">
<div class="text-xs font-600 text-g-700 mb-2">${studentList.length} học sinh</div>
<div class="flex flex-wrap gap-1.5">
${studentList.map((s,i)=>`<span class="inline-block bg-g-50 border border-g-200 rounded-lg px-2 py-1 text-xs">${i+1}. ${s}</span>`).join('')}
</div>
</div>
</div>`;
}

function renderRoom(room,el){
const records=roomMap[room];
if(!records||!records.length){el.innerHTML=noResult();return;}
// group by period+teacher
const groups={};
records.forEach(r=>{
const key=r.period+'|'+r.slot.teacher+'|'+r.slot.code+'|'+r.slot.subject;
if(!groups[key])groups[key]={period:r.period,teacher:r.slot.teacher,code:r.slot.code,subject:r.slot.subject,students:new Set()};
groups[key].students.add(r.studentName);
});
el.innerHTML=`
<div class="bg-white rounded-2xl border border-g-200 overflow-hidden shadow-sm">
<div class="bg-g-600 text-white px-4 py-3">
<div class="font-700 text-lg">📍 Phòng ${room}</div>
</div>
<div class="divide-y divide-g-100">
${Object.values(groups).map(g=>`
<div class="px-4 py-3">
<div class="flex items-center gap-2 mb-1">
<span class="bg-g-100 text-g-700 rounded-lg px-2 py-0.5 text-xs font-700">${g.period}</span>
<span class="font-600 text-sm text-g-900">${g.subject} (${g.code})</span>
</div>
<div class="text-xs text-gray-500">👨‍🏫 ${g.teacher} · ${g.students.size} học sinh</div>
</div>`).join('')}
</div>
</div>`;
}

function renderTeacher(name,el){
const records=teacherMap[name];
if(!records||!records.length){el.innerHTML=noResult();return;}
const groups={};
records.forEach(r=>{
const key=r.period+'|'+r.slot.code;
if(!groups[key])groups[key]={period:r.period,code:r.slot.code,subject:r.slot.subject,room:r.slot.room,students:new Set()};
groups[key].students.add(r.studentName);
});
el.innerHTML=`
<div class="bg-white rounded-2xl border border-g-200 overflow-hidden shadow-sm">
<div class="bg-g-600 text-white px-4 py-3">
<div class="font-700 text-lg">👨‍🏫 ${name}</div>
</div>
<div class="divide-y divide-g-100">
${Object.values(groups).map(g=>`
<div class="px-4 py-3">
<div class="flex items-center gap-2 flex-wrap mb-1">
<span class="bg-g-100 text-g-700 rounded-lg px-2 py-0.5 text-xs font-700">${g.period}</span>
<span class="font-600 text-sm text-g-900">${g.subject} — ${g.code}</span>
<span class="text-xs text-gray-400">📍 ${g.room}</span>
</div>
<div class="text-xs text-gray-500">${g.students.size} học sinh</div>
<div class="flex flex-wrap gap-1 mt-1">
${[...g.students].sort().map((s,i)=>`<span class="inline-block bg-g-50 border border-g-200 rounded px-1.5 py-0.5 text-xs">${i+1}. ${s}</span>`).join('')}
</div>
</div>`).join('')}
</div>
</div>`;
}

function noResult(){return'<div class="text-center text-gray-400 py-8 text-sm">Không tìm thấy kết quả</div>';}

// Close suggestions on outside click
document.addEventListener('click',e=>{
if(!e.target.closest('#searchBox')&&!e.target.closest('#suggestions')){
document.getElementById('suggestions').classList.add('hidden');
}
});

// Export wallpaper
function exportWallpaper(){
const sel=document.getElementById('dropdownSelect');
const val=sel.value;
if(!val&&currentTab==='student'){return;}
const canvas=document.getElementById('wallpaperCanvas');
const ctx=canvas.getContext('2d');
const W=1080,H=1920;
canvas.width=W;canvas.height=H;

// BG
const grad=ctx.createLinearGradient(0,0,W,H);
grad.addColorStop(0,'#f0fdf4');grad.addColorStop(0.5,'#dcfce7');grad.addColorStop(1,'#bbf7d0');
ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

// Header
ctx.fillStyle='#166534';ctx.font='bold 48px "Be Vietnam Pro",sans-serif';
ctx.textAlign='center';
ctx.fillText('Thời Khóa Biểu Tự Chọn 12',W/2,120);
ctx.font='24px "Be Vietnam Pro",sans-serif';ctx.fillStyle='#15803d';
ctx.fillText('Áp dụng từ ngày 4/5/2026',W/2,165);

let y=230;
ctx.textAlign='left';

if(currentTab==='student'){
const records=studentMap[val];
if(!records)return;
const d=records[0];
ctx.fillStyle='#14532d';ctx.font='bold 40px "Be Vietnam Pro",sans-serif';
ctx.fillText(d.studentName,80,y);y+=35;
ctx.font='24px "Be Vietnam Pro",sans-serif';ctx.fillStyle='#16a34a';
ctx.fillText('Lớp '+d.realClass,80,y);y+=60;
[{p:'Tiết 1-2',s:d.s1},{p:'Tiết 3-4',s:d.s2}].forEach(item=>{
ctx.fillStyle='#16a34a';ctx.fillRect(60,y-28,W-120,130);
ctx.beginPath();ctx.roundRect(60,y-28,W-120,130,16);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 28px "Be Vietnam Pro",sans-serif';
ctx.fillText(item.p+' — '+item.s.subject,90,y+5);
ctx.font='22px "Be Vietnam Pro",sans-serif';
ctx.fillText('GV: '+item.s.teacher,90,y+40);
ctx.fillText('Mã lớp: '+item.s.code+'  ·  Phòng: '+item.s.room,90,y+72);
y+=160;
});
} else if(currentTab==='teacher'){
const records=teacherMap[val];
if(!records)return;
ctx.fillStyle='#14532d';ctx.font='bold 40px "Be Vietnam Pro",sans-serif';
ctx.fillText('GV: '+val,80,y);y+=60;
const groups={};
records.forEach(r=>{
const key=r.period+'|'+r.slot.code;
if(!groups[key])groups[key]={period:r.period,code:r.slot.code,subject:r.slot.subject,room:r.slot.room,count:0};
groups[key].count++;
});
Object.values(groups).forEach(g=>{
ctx.fillStyle='#16a34a';
ctx.beginPath();ctx.roundRect(60,y-28,W-120,100,16);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 26px "Be Vietnam Pro",sans-serif';
ctx.fillText(g.period+' — '+g.subject+' ('+g.code+')',90,y+5);
ctx.font='22px "Be Vietnam Pro",sans-serif';
ctx.fillText('Phòng: '+g.room+'  ·  '+g.count+' HS',90,y+40);
y+=130;
});
} else {
ctx.fillStyle='#14532d';ctx.font='bold 36px "Be Vietnam Pro",sans-serif';
ctx.fillText(currentTab==='class'?'Mã lớp: '+val:'Phòng: '+val,80,y);y+=50;
const src=currentTab==='class'?classMap:roomMap;
const records=src[val];
if(records){
const seen=new Set();
records.forEach(r=>{
const key=r.period;
if(seen.has(key))return;seen.add(key);
ctx.fillStyle='#16a34a';
ctx.beginPath();ctx.roundRect(60,y-28,W-120,90,16);ctx.fill();
ctx.fillStyle='#fff';ctx.font='bold 24px "Be Vietnam Pro",sans-serif';
ctx.fillText(r.period+' — '+r.slot.subject+' ('+r.slot.code+')',90,y);
ctx.font='20px "Be Vietnam Pro",sans-serif';
ctx.fillText('GV: '+r.slot.teacher+(currentTab==='class'?' · Phòng: '+r.slot.room:''),90,y+32);
y+=120;
});
}
}

// Footer
ctx.textAlign='center';ctx.fillStyle='#86efac';ctx.font='20px "Be Vietnam Pro",sans-serif';
ctx.fillText('TKB Tự Chọn — NK Khoa Hưng',W/2,H-60);

const link=document.createElement('a');
link.download='tkb_'+val.replace(/\s+/g,'_')+'.png';
link.href=canvas.toDataURL('image/png');
link.click();
}

// Export CSV
function exportCSV(){
let csv='\uFEFF'+'Lớp thực,Học sinh,Môn T1-2,GV T1-2,Mã lớp T1-2,Phòng T1-2,Môn T3-4,GV T3-4,Mã lớp T3-4,Phòng T3-4\n';
allData.forEach(d=>{
csv+=[d.realClass,d.studentName,d.s1.subject,d.s1.teacher,d.s1.code,d.s1.room,d.s2.subject,d.s2.teacher,d.s2.code,d.s2.room].map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(',')+'\n';
});
const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
const link=document.createElement('a');
link.href=URL.createObjectURL(blob);
link.download='tkb_tu_chon_12.csv';
link.click();
}

// Init
async function init(){
try{
const resp=await fetch(CSV_URL);
if(!resp.ok)throw new Error('Fetch failed');
const text=await resp.text();
allData=parseCSV(text);
buildIndexes();
document.getElementById('loading').classList.add('hidden');
document.getElementById('main').classList.remove('hidden');
renderStats();
switchTab('student');
lucide.createIcons();
}catch(e){
document.getElementById('loading').innerHTML='<div class="text-red-500 text-center"><p class="font-600">Lỗi tải dữ liệu</p><p class="text-sm mt-2">Vui lòng kiểm tra kết nối mạng và thử lại</p><button onclick="init()" class="mt-3 px-4 py-2 bg-g-600 text-white rounded-lg text-sm">Thử lại</button></div>';
}
}
