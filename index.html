  <script>
const SHEET_ID='14QJ8ALOZYFfLpuMsIaMRTzmMgvES8EZQsWSJeyqW160';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

let rawData=[], students=[], classMap={}, roomMap={}, teacherMap={};
let currentTab='student', currentSelection=null;

// Config
const defaultConfig={
  main_title:'Thời Khóa Biểu Tự Chọn Lớp 12',
  subtitle:'Áp dụng từ ngày 4/5/2026',
  background_color:'#f0f4f8',
  surface_color:'#ffffff',
  text_color:'#1e3a5f',
  accent_color:'#2563eb',
  muted_color:'#64748b',
  font_family:'Be Vietnam Pro',
  font_size:14
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange:async(c)=>{
    const t=c.main_title||defaultConfig.main_title;
    const s=c.subtitle||defaultConfig.subtitle;
    document.getElementById('titleEl').textContent=t;
    document.getElementById('subtitleEl').textContent=s;
    const bg=c.background_color||defaultConfig.background_color;
    const sf=c.surface_color||defaultConfig.surface_color;
    const tx=c.text_color||defaultConfig.text_color;
    const ac=c.accent_color||defaultConfig.accent_color;
    const mu=c.muted_color||defaultConfig.muted_color;
    
    // Apply colors to page
    document.body.style.backgroundColor=bg;
    document.documentElement.style.setProperty('--color-bg',bg);
    document.documentElement.style.setProperty('--color-text',tx);
    document.documentElement.style.setProperty('--color-accent',ac);
    document.documentElement.style.setProperty('--color-muted',mu);
    
    // Update active tab colors
    document.querySelectorAll('.tab-btn.active').forEach(b=>{
      b.style.backgroundColor=tx;
    });
    
    // Update stat card gradient
    document.querySelectorAll('.stat-card').forEach(card=>{
      card.style.background=`linear-gradient(135deg,${tx} 0%,${ac} 100%)`;
    });
    
    const ff=c.font_family||defaultConfig.font_family;
    const fs=c.font_size||defaultConfig.font_size;
    document.body.style.fontFamily=`${ff}, sans-serif`;
    document.body.style.fontSize=fs+'px';
  },
  mapToCapabilities:(c)=>({
    recolorables:[
      {get:()=>c.background_color||defaultConfig.background_color,set:v=>{c.background_color=v;window.elementSdk.setConfig({background_color:v})}},
      {get:()=>c.text_color||defaultConfig.text_color,set:v=>{c.text_color=v;window.elementSdk.setConfig({text_color:v})}},
      {get:()=>c.accent_color||defaultConfig.accent_color,set:v=>{c.accent_color=v;window.elementSdk.setConfig({accent_color:v})}},
      {get:()=>c.muted_color||defaultConfig.muted_color,set:v=>{c.muted_color=v;window.elementSdk.setConfig({muted_color:v})}}
    ],
    borderables:[],
    fontEditable:{get:()=>c.font_family||defaultConfig.font_family,set:v=>{c.font_family=v;window.elementSdk.setConfig({font_family:v})}},
    fontSizeable:{get:()=>c.font_size||defaultConfig.font_size,set:v=>{c.font_size=v;window.elementSdk.setConfig({font_size:v})}}
  }),
  mapToEditPanelValues:(c)=>new Map([
    ['main_title',c.main_title||defaultConfig.main_title],
    ['subtitle',c.subtitle||defaultConfig.subtitle],
    ['background_color',c.background_color||defaultConfig.background_color],
    ['text_color',c.text_color||defaultConfig.text_color],
    ['accent_color',c.accent_color||defaultConfig.accent_color],
    ['muted_color',c.muted_color||defaultConfig.muted_color]
  ])
});

function parseCSV(text){
  const lines=[];
  let cur='',inQ=false;
  const rows=[];
  // Simple CSV parse handling quotes
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'&&text[i+1]==='"'){cur+='"';i++}
      else if(ch==='"')inQ=false;
      else cur+=ch;
    }else{
      if(ch==='"')inQ=true;
      else if(ch===','){lines.push(cur);cur=''}
      else if(ch==='\n'||ch==='\r'){
        if(ch==='\r'&&text[i+1]==='\n')i++;
        lines.push(cur);cur='';
        if(lines.length)rows.push([...lines]);
        lines.length=0;
      }else cur+=ch;
    }
  }
  lines.push(cur);
  if(lines.some(l=>l.trim()))rows.push([...lines]);
  return rows;
}

async function loadData(){
  try{
    const r=await fetch(CSV_URL);
    if(!r.ok)throw new Error('Fetch fail');
    const txt=await r.text();
    const rows=parseCSV(txt);
    if(rows.length<2)throw new Error('No data');

    // Skip header row (first row is column names)
    rawData=[];
    for(let i=1;i<rows.length;i++){
      const row=rows[i];
      if(!row||row.length<2)continue;
      const realClass=(row[0]||'').trim();
      const name=(row[1]||'').trim();
      if(!realClass&&!name)continue;

      const sessions=[];
      // Parse pairs: subject, teacher, classCode, room starting from col 2
      // Pattern: MON, TEACHER, CLASS_CODE, ROOM repeating
      let ci=2;
      let sessionIdx=0;
      while(ci+3<row.length){
        const subj=(row[ci]||'').trim();
        const teacher=(row[ci+1]||'').trim();
        const classCode=(row[ci+2]||'').trim();
        const room=(row[ci+3]||'').trim();
        if(subj||teacher||classCode||room){
          sessionIdx++;
          sessions.push({period:`Tiết ${sessionIdx*2-1}-${sessionIdx*2}`,subject:subj,teacher,classCode,room});
        }
        ci+=4;
      }

      const entry={realClass,name,sessions};
      rawData.push(entry);
    }

    buildIndexes();
    renderStats();
    switchTab('student');
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    lucide.createIcons();
  }catch(e){
    console.error(e);
    document.getElementById('loading').innerHTML=`<div class="text-center p-8"><p class="text-red-500 text-sm font-medium mb-2">Không thể tải dữ liệu</p><p class="text-xs text-gray-500 mb-4">${e.message}</p><button onclick="loadData()" class="px-4 py-2 bg-blue-600 text-white text-xs rounded-lg">Thử lại</button></div>`;
  }
}

function buildIndexes(){
  students=[];
  classMap={};roomMap={};teacherMap={};

  rawData.forEach(entry=>{
    students.push({name:entry.name,realClass:entry.realClass,sessions:entry.sessions});

    entry.sessions.forEach(s=>{
      if(s.classCode){
        if(!classMap[s.classCode])classMap[s.classCode]={subject:s.subject,teacher:s.teacher,room:s.room,students:[]};
        classMap[s.classCode].students.push({name:entry.name,realClass:entry.realClass,period:s.period});
      }
      if(s.room){
        if(!roomMap[s.room])roomMap[s.room]=[];
        roomMap[s.room].push({teacher:s.teacher,period:s.period,subject:s.subject,classCode:s.classCode,studentCount:0});
      }
      if(s.teacher){
        if(!teacherMap[s.teacher])teacherMap[s.teacher]=[];
        teacherMap[s.teacher].push({period:s.period,subject:s.subject,classCode:s.classCode,room:s.room,realClass:entry.realClass,studentName:entry.name});
      }
    });
  });

  // Dedupe room entries and count students
  Object.keys(roomMap).forEach(r=>{
    const grouped={};
    roomMap[r].forEach(e=>{
      const k=e.period+'|'+e.teacher+'|'+e.classCode;
      if(!grouped[k])grouped[k]={...e,studentCount:1};
      else grouped[k].studentCount++;
    });
    roomMap[r]=Object.values(grouped);
  });
}

function renderStats(){
  const el=document.getElementById('stats');
  const s=[
    {label:'Học sinh',value:students.length,icon:'users'},
    {label:'Mã lớp',value:Object.keys(classMap).length,icon:'book-open'},
    {label:'Phòng',value:Object.keys(roomMap).length,icon:'map-pin'},
    {label:'Giáo viên',value:Object.keys(teacherMap).length,icon:'user-check'}
  ];
  el.innerHTML=s.map(x=>`
    <div class="stat-card rounded-xl p-3 text-white">
      <div class="flex items-center gap-2 mb-1"><i data-lucide="${x.icon}" style="width:14px;height:14px;opacity:.8"></i><span class="text-[10px] opacity-80">${x.label}</span></div>
      <div class="text-xl font-bold">${x.value}</div>
    </div>
  `).join('');
  lucide.createIcons();
}

function switchTab(tab){
  currentTab=tab;
  currentSelection=null;
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tab);
  });
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.add('hidden');
  hideSuggestions();
  populateDropdown();
  // Auto-select first item
  const dd=document.getElementById('dropdownSelect');
  if(dd.options.length>0){
    currentSelection=dd.value;
    renderResults();
  }
}

function populateDropdown(){
  const dd=document.getElementById('dropdownSelect');
  dd.innerHTML='';
  let items=[];
  if(currentTab==='student')items=students.map(s=>s.name).filter((v,i,a)=>a.indexOf(v)===i).sort();
  else if(currentTab==='class')items=Object.keys(classMap).sort();
  else if(currentTab==='room')items=Object.keys(roomMap).sort();
  else items=Object.keys(teacherMap).sort();

  items.forEach(it=>{
    const o=document.createElement('option');
    o.value=it;o.textContent=it;
    dd.appendChild(o);
  });
}

function onDropdownSelect(){
  const dd=document.getElementById('dropdownSelect');
  currentSelection=dd.value;
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.add('hidden');
  hideSuggestions();
  renderResults();
}

function onSearch(){
  const q=document.getElementById('searchInput').value.trim();
  document.getElementById('clearBtn').classList.toggle('hidden',!q);
  if(!q){hideSuggestions();onDropdownSelect();return}
  showSuggestions();
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.add('hidden');
  hideSuggestions();
  onDropdownSelect();
}

function showSuggestions(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  if(!q){hideSuggestions();return}
  const sg=document.getElementById('suggestions');
  let items=[];
  if(currentTab==='student')items=students.map(s=>s.name).filter((v,i,a)=>a.indexOf(v)===i);
  else if(currentTab==='class')items=Object.keys(classMap);
  else if(currentTab==='room')items=Object.keys(roomMap);
  else items=Object.keys(teacherMap);

  const filtered=items.filter(x=>x.toLowerCase().includes(q));
  if(!filtered.length){sg.classList.add('hidden');return}

  sg.innerHTML=filtered.slice(0,20).map(x=>`<div class="px-3 py-2 text-xs hover:bg-[#dbeafe] cursor-pointer transition-colors" onclick="selectSuggestion('${x.replace(/'/g,"\\'")}')">${highlight(x,q)}</div>`).join('');
  sg.classList.remove('hidden');
}

function highlight(text,q){
  const idx=text.toLowerCase().indexOf(q);
  if(idx<0)return text;
  return text.slice(0,idx)+'<span class="font-bold text-[#2563eb]">'+text.slice(idx,idx+q.length)+'</span>'+text.slice(idx+q.length);
}

function selectSuggestion(val){
  document.getElementById('searchInput').value=val;
  document.getElementById('clearBtn').classList.remove('hidden');
  currentSelection=val;
  // Update dropdown too
  const dd=document.getElementById('dropdownSelect');
  dd.value=val;
  hideSuggestions();
  renderResults();
}

function hideSuggestions(){document.getElementById('suggestions').classList.add('hidden')}

document.addEventListener('click',e=>{
  if(!e.target.closest('#searchInput')&&!e.target.closest('#suggestions'))hideSuggestions();
});

function renderResults(){
  const el=document.getElementById('results');
  if(!currentSelection){el.innerHTML='<p class="text-center text-xs text-[#94a3b8] py-8">Chọn mục để xem</p>';return}

  let html='';
  if(currentTab==='student'){
    const list=students.filter(s=>s.name===currentSelection);
    if(!list.length){el.innerHTML=noResult();return}
    list.forEach(st=>{
      html+=`<div class="bg-white rounded-xl p-3 card-hover fade-in border border-[#e2e8f0]">
        <div class="flex items-center gap-2 mb-2">
          <span class="w-7 h-7 rounded-full bg-[#dbeafe] flex items-center justify-center text-[10px] font-bold text-[#2563eb]">${st.name.charAt(0)}</span>
          <div><div class="font-semibold text-xs text-[#1e3a5f]">${st.name}</div><div class="text-[10px] text-[#64748b]">Lớp ${st.realClass}</div></div>
        </div>
        <div class="space-y-1.5">${st.sessions.map(s=>`
          <div class="flex items-center gap-2 bg-[#f8fafc] rounded-lg px-2.5 py-1.5 text-[11px]">
            <span class="font-medium text-[#2563eb] w-14 shrink-0">${s.period}</span>
            <span class="font-semibold text-[#1e3a5f] w-8">${s.subject}</span>
            <span class="text-[#64748b] flex-1 truncate">${s.teacher}</span>
            <span class="text-[10px] bg-[#dbeafe] text-[#2563eb] px-1.5 py-0.5 rounded font-medium">${s.classCode}</span>
            <span class="text-[10px] text-[#64748b]">${s.room}</span>
          </div>
        `).join('')}</div>
      </div>`;
    });
  }else if(currentTab==='class'){
    const info=classMap[currentSelection];
    if(!info){el.innerHTML=noResult();return}
    html+=`<div class="bg-white rounded-xl p-3 card-hover fade-in border border-[#e2e8f0]">
      <div class="flex items-center gap-2 mb-2">
        <span class="w-7 h-7 rounded-full bg-[#dbeafe] flex items-center justify-center text-[10px] font-bold text-[#2563eb]">${currentSelection.charAt(0)}</span>
        <div>
          <div class="font-semibold text-xs text-[#1e3a5f]">${currentSelection}</div>
          <div class="text-[10px] text-[#64748b]">${info.subject} • ${info.teacher} • Phòng ${info.room}</div>
        </div>
        <span class="ml-auto text-[10px] bg-[#dbeafe] text-[#2563eb] px-2 py-0.5 rounded-full font-medium">${info.students.length} HS</span>
      </div>
      <div class="space-y-1">${info.students.map((s,i)=>`
        <div class="flex items-center gap-2 bg-[#f8fafc] rounded-lg px-2.5 py-1.5 text-[11px]">
          <span class="text-[#94a3b8] w-5 text-right">${i+1}.</span>
          <span class="font-medium text-[#1e3a5f] flex-1">${s.name}</span>
          <span class="text-[10px] text-[#64748b]">${s.realClass}</span>
          <span class="text-[10px] text-[#2563eb]">${s.period}</span>
        </div>
      `).join('')}</div>
    </div>`;
  }else if(currentTab==='room'){
    const info=roomMap[currentSelection];
    if(!info){el.innerHTML=noResult();return}
    html+=`<div class="bg-white rounded-xl p-3 card-hover fade-in border border-[#e2e8f0]">
      <div class="flex items-center gap-2 mb-2">
        <span class="w-7 h-7 rounded-full bg-[#dbeafe] flex items-center justify-center text-[10px] font-bold text-[#2563eb]"><i data-lucide="map-pin" style="width:12px;height:12px"></i></span>
        <div class="font-semibold text-xs text-[#1e3a5f]">Phòng ${currentSelection}</div>
      </div>
      <div class="space-y-1">${info.map(s=>`
        <div class="flex items-center gap-2 bg-[#f8fafc] rounded-lg px-2.5 py-1.5 text-[11px]">
          <span class="font-medium text-[#2563eb] w-14 shrink-0">${s.period}</span>
          <span class="font-medium text-[#1e3a5f] flex-1">${s.teacher}</span>
          <span class="text-[10px] bg-[#dbeafe] text-[#2563eb] px-1.5 py-0.5 rounded font-medium">${s.classCode}</span>
          <span class="text-[10px] text-[#64748b]">${s.studentCount} HS</span>
        </div>
      `).join('')}</div>
    </div>`;
  }else{
    const info=teacherMap[currentSelection];
    if(!info){el.innerHTML=noResult();return}
    // Group by period
    const byPeriod={};
    info.forEach(s=>{
      if(!byPeriod[s.period])byPeriod[s.period]={subject:s.subject,classCode:s.classCode,room:s.room,students:[]};
      byPeriod[s.period].students.push({name:s.studentName,realClass:s.realClass});
    });
    html+=`<div class="bg-white rounded-xl p-3 card-hover fade-in border border-[#e2e8f0]">
      <div class="flex items-center gap-2 mb-2">
        <span class="w-7 h-7 rounded-full bg-[#dbeafe] flex items-center justify-center text-[10px] font-bold text-[#2563eb]">${currentSelection.charAt(0)}</span>
        <div class="font-semibold text-xs text-[#1e3a5f]">${currentSelection}</div>
      </div>
      <div class="space-y-2">${Object.entries(byPeriod).map(([p,d])=>`
        <div class="bg-[#f8fafc] rounded-lg p-2.5">
          <div class="flex items-center gap-2 mb-1.5 text-[11px]">
            <span class="font-medium text-[#2563eb]">${p}</span>
            <span class="font-semibold text-[#1e3a5f]">${d.subject}</span>
            <span class="text-[10px] bg-[#dbeafe] text-[#2563eb] px-1.5 py-0.5 rounded font-medium">${d.classCode}</span>
            <span class="text-[10px] text-[#64748b]">${d.room}</span>
            <span class="ml-auto text-[10px] text-[#64748b]">${d.students.length} HS</span>
          </div>
          <div class="space-y-0.5">${d.students.map((s,i)=>`
            <div class="text-[10px] text-[#64748b] pl-2">${i+1}. ${s.name} <span class="text-[#94a3b8]">(${s.realClass})</span></div>
          `).join('')}</div>
        </div>
      `).join('')}</div>
    </div>`;
  }
  el.innerHTML=html;
  lucide.createIcons();
}

function noResult(){return '<p class="text-center text-xs text-[#94a3b8] py-8">Không tìm thấy kết quả</p>'}

function exportWallpaper(){
  if(!currentSelection){return}
  const c=document.getElementById('wallpaperCanvas');
  const ctx=c.getContext('2d');
  c.width=1080;c.height=1920;

  // Background
  const bg=ctx.createLinearGradient(0,0,0,1920);
  bg.addColorStop(0,'#0f172a');bg.addColorStop(1,'#1e3a5f');
  ctx.fillStyle=bg;ctx.fillRect(0,0,1080,1920);

  // Header
  ctx.fillStyle='#ffffff';ctx.font='bold 48px "Be Vietnam Pro", sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Thời Khóa Biểu Tự Chọn',540,120);
  ctx.font='24px "Be Vietnam Pro", sans-serif';
  ctx.fillStyle='#94a3b8';
  ctx.fillText('Áp dụng từ ngày 4/5/2026',540,165);

  let y=240;
  ctx.textAlign='left';

  if(currentTab==='student'){
    const list=students.filter(s=>s.name===currentSelection);
    list.forEach(st=>{
      ctx.fillStyle='#60a5fa';ctx.font='bold 36px "Be Vietnam Pro", sans-serif';
      ctx.fillText(`${st.name} — Lớp ${st.realClass}`,60,y);y+=60;
      st.sessions.forEach(s=>{
        ctx.fillStyle='#334155';
        roundRect(ctx,60,y-20,960,70,12);ctx.fill();
        ctx.fillStyle='#60a5fa';ctx.font='bold 26px "Be Vietnam Pro", sans-serif';
        ctx.fillText(s.period,80,y+18);
        ctx.fillStyle='#ffffff';ctx.font='bold 26px "Be Vietnam Pro", sans-serif';
        ctx.fillText(s.subject,260,y+18);
        ctx.fillStyle='#94a3b8';ctx.font='24px "Be Vietnam Pro", sans-serif';
        ctx.fillText(s.teacher,380,y+18);
        ctx.fillText(`${s.classCode} • ${s.room}`,760,y+18);
        y+=85;
      });
      y+=20;
    });
  }else if(currentTab==='teacher'){
    const info=teacherMap[currentSelection];
    if(info){
      ctx.fillStyle='#60a5fa';ctx.font='bold 36px "Be Vietnam Pro", sans-serif';
      ctx.fillText(currentSelection,60,y);y+=60;
      const byP={};
      info.forEach(s=>{if(!byP[s.period])byP[s.period]={...s,count:1};else byP[s.period].count++});
      Object.values(byP).forEach(d=>{
        ctx.fillStyle='#334155';roundRect(ctx,60,y-20,960,70,12);ctx.fill();
        ctx.fillStyle='#60a5fa';ctx.font='bold 26px "Be Vietnam Pro", sans-serif';
        ctx.fillText(d.period,80,y+18);
        ctx.fillStyle='#ffffff';ctx.font='bold 26px "Be Vietnam Pro", sans-serif';
        ctx.fillText(`${d.subject} — ${d.classCode}`,260,y+18);
        ctx.fillStyle='#94a3b8';ctx.font='24px "Be Vietnam Pro", sans-serif';
        ctx.fillText(`${d.room} • ${d.count} HS`,700,y+18);
        y+=85;
      });
    }
  }else{
    ctx.fillStyle='#60a5fa';ctx.font='bold 36px "Be Vietnam Pro", sans-serif';
    ctx.fillText(currentSelection,60,y);y+=60;
    ctx.fillStyle='#94a3b8';ctx.font='24px "Be Vietnam Pro", sans-serif';
    ctx.fillText('Chi tiết xem trên ứng dụng',60,y);
  }

  document.getElementById('wallpaperModal').classList.remove('hidden');
  document.getElementById('downloadWallpaper').href=c.toDataURL('image/png');
  lucide.createIcons();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function closeWallpaper(){document.getElementById('wallpaperModal').classList.add('hidden')}

function exportCSV(){
  let csv='\uFEFF';// BOM for Excel
  csv+='Lớp thực,Họ tên,Tiết,Môn,Giáo viên,Mã lớp,Phòng\n';
  rawData.forEach(e=>{
    e.sessions.forEach(s=>{
      csv+=`"${e.realClass}","${e.name}","${s.period}","${s.subject}","${s.teacher}","${s.classCode}","${s.room}"\n`;
    });
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='tkb-tuchon-lop12.csv';
  a.click();URL.revokeObjectURL(url);
}
