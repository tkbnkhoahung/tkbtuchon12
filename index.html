<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu Tự Chọn Lớp 12</title>

    <!-- Tailwind CSS qua CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Thư viện React và ReactDOM qua CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel để biên dịch JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Thư viện xuất ảnh -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <!-- Nơi render ứng dụng React -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, createContext, useContext } = React;

        // ================= THEME CONFIGURATION =================
        const THEMES = {
            green: {
                id: 'green', name: 'Xanh lá', colorHex: '#16a34a',
                appBg: 'bg-[#f4fcf6]', selection: 'selection:bg-green-200',
                textDark: 'text-green-900', textMain: 'text-green-800', textLight: 'text-green-500', textHighlight: 'text-green-700', textPrimary: 'text-green-600',
                bgLight: 'bg-green-50', bgMid: 'bg-green-100', bgPrimary: 'bg-green-600', bgPrimaryLight: 'bg-green-400', textWhite: 'text-white', hoverPrimary: 'hover:bg-green-700', hoverBgLight: 'hover:bg-green-100', hoverBgLight50: 'hover:bg-green-50',
                borderLight: 'border-green-50', borderMid: 'border-green-100', borderHighlight: 'border-green-200', borderPrimary: 'border-green-600',
                focusRing: 'focus:ring-green-400', gradientFrom: 'from-[#e8fbf0]', gradientTo: 'to-[#f4fcf6]', iconLight: 'text-green-400', iconMain: 'text-green-600',
                scrollbarThumb: '#bbf7d0', scrollbarThumbHover: '#86efac', scrollbarTrack: '#f0fdf4', exportBg: '#f0fdf4', borderDashed: 'border-green-200',
                gradientCard: 'from-green-50 to-white'
            },
            blue: {
                id: 'blue', name: 'Xanh dương', colorHex: '#2563eb',
                appBg: 'bg-[#f0f8ff]', selection: 'selection:bg-blue-200',
                textDark: 'text-blue-900', textMain: 'text-blue-800', textLight: 'text-blue-500', textHighlight: 'text-blue-700', textPrimary: 'text-blue-600',
                bgLight: 'bg-blue-50', bgMid: 'bg-blue-100', bgPrimary: 'bg-blue-600', bgPrimaryLight: 'bg-blue-400', textWhite: 'text-white', hoverPrimary: 'hover:bg-blue-700', hoverBgLight: 'hover:bg-blue-100', hoverBgLight50: 'hover:bg-blue-50',
                borderLight: 'border-blue-50', borderMid: 'border-blue-100', borderHighlight: 'border-blue-200', borderPrimary: 'border-blue-600',
                focusRing: 'focus:ring-blue-400', gradientFrom: 'from-[#e6f2ff]', gradientTo: 'to-[#f0f8ff]', iconLight: 'text-blue-400', iconMain: 'text-blue-600',
                scrollbarThumb: '#bfdbfe', scrollbarThumbHover: '#93c5fd', scrollbarTrack: '#eff6ff', exportBg: '#eff6ff', borderDashed: 'border-blue-200',
                gradientCard: 'from-blue-50 to-white'
            },
            purple: {
                id: 'purple', name: 'Tím', colorHex: '#9333ea',
                appBg: 'bg-[#fcfaff]', selection: 'selection:bg-purple-200',
                textDark: 'text-purple-900', textMain: 'text-purple-800', textLight: 'text-purple-500', textHighlight: 'text-purple-700', textPrimary: 'text-purple-600',
                bgLight: 'bg-purple-50', bgMid: 'bg-purple-100', bgPrimary: 'bg-purple-600', bgPrimaryLight: 'bg-purple-400', textWhite: 'text-white', hoverPrimary: 'hover:bg-purple-700', hoverBgLight: 'hover:bg-purple-100', hoverBgLight50: 'hover:bg-purple-50',
                borderLight: 'border-purple-50', borderMid: 'border-purple-100', borderHighlight: 'border-purple-200', borderPrimary: 'border-purple-600',
                focusRing: 'focus:ring-purple-400', gradientFrom: 'from-[#f5eaff]', gradientTo: 'to-[#fcfaff]', iconLight: 'text-purple-400', iconMain: 'text-purple-600',
                scrollbarThumb: '#e9d5ff', scrollbarThumbHover: '#d8b4fe', scrollbarTrack: '#faf5ff', exportBg: '#faf5ff', borderDashed: 'border-purple-200',
                gradientCard: 'from-purple-50 to-white'
            },
            rose: {
                id: 'rose', name: 'Hồng', colorHex: '#e11d48',
                appBg: 'bg-[#fff5f6]', selection: 'selection:bg-rose-200',
                textDark: 'text-rose-900', textMain: 'text-rose-800', textLight: 'text-rose-500', textHighlight: 'text-rose-700', textPrimary: 'text-rose-600',
                bgLight: 'bg-rose-50', bgMid: 'bg-rose-100', bgPrimary: 'bg-rose-600', bgPrimaryLight: 'bg-rose-400', textWhite: 'text-white', hoverPrimary: 'hover:bg-rose-700', hoverBgLight: 'hover:bg-rose-100', hoverBgLight50: 'hover:bg-rose-50',
                borderLight: 'border-rose-50', borderMid: 'border-rose-100', borderHighlight: 'border-rose-200', borderPrimary: 'border-rose-600',
                focusRing: 'focus:ring-rose-400', gradientFrom: 'from-[#ffe4e6]', gradientTo: 'to-[#fff5f6]', iconLight: 'text-rose-400', iconMain: 'text-rose-600',
                scrollbarThumb: '#fecdd3', scrollbarThumbHover: '#fda4af', scrollbarTrack: '#fff1f2', exportBg: '#fff1f2', borderDashed: 'border-rose-200',
                gradientCard: 'from-rose-50 to-white'
            },
            amber: {
                id: 'amber', name: 'Vàng', colorHex: '#d97706',
                appBg: 'bg-[#fffbf0]', selection: 'selection:bg-amber-200',
                textDark: 'text-amber-900', textMain: 'text-amber-800', textLight: 'text-amber-600', textHighlight: 'text-amber-700', textPrimary: 'text-amber-600',
                bgLight: 'bg-amber-50', bgMid: 'bg-amber-100', bgPrimary: 'bg-amber-500', bgPrimaryLight: 'bg-amber-400', textWhite: 'text-white', hoverPrimary: 'hover:bg-amber-600', hoverBgLight: 'hover:bg-amber-100', hoverBgLight50: 'hover:bg-amber-50',
                borderLight: 'border-amber-50', borderMid: 'border-amber-100', borderHighlight: 'border-amber-200', borderPrimary: 'border-amber-500',
                focusRing: 'focus:ring-amber-400', gradientFrom: 'from-[#fef3c7]', gradientTo: 'to-[#fffbf0]', iconLight: 'text-amber-400', iconMain: 'text-amber-600',
                scrollbarThumb: '#fde68a', scrollbarThumbHover: '#fcd34d', scrollbarTrack: '#fffbeb', exportBg: '#fffbeb', borderDashed: 'border-amber-200',
                gradientCard: 'from-amber-50 to-white'
            }
        };

        const ThemeContext = createContext(THEMES.green);

        // ================= ICONS CỤC BỘ TỪ LUCIDE =================
        const SvgIcon = ({ paths, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {paths}
            </svg>
        );

        const IconHome = (p) => <SvgIcon {...p} paths={<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>} />;
        const IconSearch = (p) => <SvgIcon {...p} paths={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />;
        const IconDownload = (p) => <SvgIcon {...p} paths={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const IconImage = (p) => <SvgIcon {...p} paths={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />;
        const IconUsers = (p) => <SvgIcon {...p} paths={<><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />;
        const IconBookOpen = (p) => <SvgIcon {...p} paths={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
        const IconMapPin = (p) => <SvgIcon {...p} paths={<><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>} />;
        const IconUser = (p) => <SvgIcon {...p} paths={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />;
        const IconLayoutGrid = (p) => <SvgIcon {...p} paths={<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></>} />;
        const IconCalendar = (p) => <SvgIcon {...p} paths={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;
        const IconRefreshCw = (p) => <SvgIcon {...p} paths={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></>} />;
        const IconX = (p) => <SvgIcon {...p} paths={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const IconClock = (p) => <SvgIcon {...p} paths={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
        const IconMonitor = (p) => <SvgIcon {...p} paths={<><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>} />;

        // ================= COMPONENT CHÍNH =================
        function App() {
            // ================= STATE MANAGEMENT =================
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [activeTab, setActiveTab] = useState('hocsinh'); // hocsinh, malop, phong, giaovien
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedItem, setSelectedItem] = useState('');
            const [isExporting, setIsExporting] = useState(false);
            const [currentThemeKey, setCurrentThemeKey] = useState('green');
            const wallpaperRef = useRef(null);

            const t = THEMES[currentThemeKey];

            // ================= FETCH & PARSE DATA =================
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQFBaheWuorYlfWoVnK9YfCsHMOnuD2T3snqgD2SjISW_91fxr0d4KphUCJsmJyFhMFKNXFKJJWn3Gb/pub?output=csv";
                        const response = await fetch(sheetUrl);
                        if (!response.ok) throw new Error("Không thể tải dữ liệu từ Google Sheet.");
                        
                        const csvText = await response.text();
                        const parsedData = parseCSV(csvText);
                        
                        setData(parsedData.slice(1));
                        setLoading(false);
                    } catch (err) {
                        console.error(err);
                        setError("Lỗi kết nối dữ liệu. Vui lòng thử lại sau.");
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            const parseCSV = (str) => {
                const rows = [];
                let row = [];
                let curr = '';
                let inQuotes = false;
                
                for (let i = 0; i < str.length; i++) {
                    const char = str[i];
                    if (char === '"' && str[i+1] === '"') {
                        curr += '"'; i++;
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        row.push(curr.trim()); curr = '';
                    } else if (char === '\n' && !inQuotes) {
                        row.push(curr.trim()); rows.push(row); row = []; curr = '';
                    } else if (char !== '\r') {
                        curr += char;
                    }
                }
                if (curr || row.length) {
                    row.push(curr.trim()); rows.push(row);
                }
                return rows.filter(r => r.length > 1);
            };

            // ================= DATA PROCESSING =================
            const lists = useMemo(() => {
                if (!data || !data.length) return { hs: [], malop: [], phong: [], gv: [] };
                
                const hs = [...new Set(data.map(r => r[1]).filter(Boolean))].sort();
                const ml1 = data.map(r => r[4]).filter(Boolean);
                const ml2 = data.map(r => r[8]).filter(Boolean);
                const malop = [...new Set([...ml1, ...ml2])].sort();
                
                const p1 = data.map(r => r[5]).filter(Boolean);
                const p2 = data.map(r => r[9]).filter(Boolean);
                const phong = [...new Set([...p1, ...p2])].sort();
                
                const gv1 = data.map(r => r[3]).filter(Boolean);
                const gv2 = data.map(r => r[7]).filter(Boolean);
                const gv = [...new Set([...gv1, ...gv2])].sort();

                return { hs, malop, phong, gv };
            }, [data]);

            const stats = useMemo(() => {
                if (!data || !data.length) return { hs: 0, lop: 0, phong: 0, gv: 0 };
                return {
                    hs: lists.hs?.length || 0,
                    lop: [...new Set(data.map(r => r[0]).filter(Boolean))].length,
                    phong: lists.phong?.length || 0,
                    gv: lists.gv?.length || 0
                };
            }, [lists, data]);

            useEffect(() => {
                setSearchTerm('');
                if (activeTab === 'hocsinh' && lists.hs?.length) setSelectedItem(lists.hs[0]);
                else if (activeTab === 'malop' && lists.malop?.length) setSelectedItem(lists.malop[0]);
                else if (activeTab === 'phong' && lists.phong?.length) setSelectedItem(lists.phong[0]);
                else if (activeTab === 'giaovien' && lists.gv?.length) setSelectedItem(lists.gv[0]);
                else setSelectedItem('');
            }, [activeTab, lists]);

            const getActiveList = () => {
                switch(activeTab) {
                    case 'hocsinh': return lists.hs || [];
                    case 'malop': return lists.malop || [];
                    case 'phong': return lists.phong || [];
                    case 'giaovien': return lists.gv || [];
                    default: return [];
                }
            };

            const filteredOptions = getActiveList().filter(item => 
                item.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const exportToImage = async () => {
                if (!wallpaperRef.current || !window.html2canvas) return;
                setIsExporting(true);
                try {
                    const canvas = await window.html2canvas(wallpaperRef.current, {
                        scale: 2,
                        backgroundColor: t.exportBg,
                        useCORS: true
                    });
                    const link = document.createElement('a');
                    link.download = `TKB_${activeTab}_${selectedItem.replace(/\s+/g, '_')}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) {
                    console.error("Lỗi xuất ảnh:", err);
                    alert("Không thể xuất ảnh. Vui lòng thử lại.");
                }
                setIsExporting(false);
            };

            const exportToCSV = () => {
                if (!data || !data.length) return;
                let csvContent = "Lop Thuc,Ten Hoc Sinh,Mon T1-2,GV T1-2,Ma Lop T1-2,Phong T1-2,Mon T3-4,GV T3-4,Ma Lop T3-4,Phong T3-4\n";
                data.forEach(row => {
                    const cleanRow = row.map(cell => `"${(cell || '').replace(/"/g, '""')}"`);
                    csvContent += cleanRow.join(",") + "\n";
                });
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "ThoiKhoaBieu_ToanTruong.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            if (loading) {
                return (
                    <div className={`min-h-screen ${t.bgLight} flex flex-col items-center justify-center ${t.textMain}`}>
                        <IconRefreshCw className="w-10 h-10 animate-spin mb-4" />
                        <h2 className="text-xl font-semibold animate-pulse">Đang tải dữ liệu thời khóa biểu...</h2>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className={`min-h-screen ${t.bgLight} flex items-center justify-center text-red-600`}>
                        <p className="font-medium bg-white p-6 rounded-2xl shadow-sm border border-red-200">{error}</p>
                    </div>
                );
            }

            return (
                <ThemeContext.Provider value={t}>
                    <div className={`min-h-screen ${t.appBg} ${t.textDark} font-sans pb-12 ${t.selection} transition-colors duration-300`}>
                        {/* Dynamic Styles for Custom Scrollbar & Animations */}
                        <style>{`
                            .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                            .custom-scrollbar::-webkit-scrollbar-track { background: ${t.scrollbarTrack}; border-radius: 10px; }
                            .custom-scrollbar::-webkit-scrollbar-thumb { background: ${t.scrollbarThumb}; border-radius: 10px; }
                            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: ${t.scrollbarThumbHover}; }
                            .scrollbar-hide::-webkit-scrollbar { display: none; }
                            .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
                            
                            @keyframes slideUpFade {
                                from { opacity: 0; transform: translateY(20px); }
                                to { opacity: 1; transform: translateY(0); }
                            }
                            .animate-slide-up { animation: slideUpFade 0.4s ease-out forwards; }
                            
                            @keyframes zoomIn {
                                from { opacity: 0; transform: scale(0.95); }
                                to { opacity: 1; transform: scale(1); }
                            }
                            .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
                        `}</style>

                        <header className={`bg-white sticky top-0 z-30 shadow-sm border-b ${t.borderMid} transition-colors duration-300`}>
                            <div className="max-w-md md:max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
                                <div>
                                    <h1 className={`text-xl md:text-2xl font-bold ${t.textMain} flex items-center gap-2`}>
                                        <div className={`p-1.5 rounded-lg ${t.bgLight} ${t.textPrimary}`}>
                                            <IconCalendar className={`w-5 h-5 md:w-6 md:h-6`} />
                                        </div>
                                        TKB Tự Chọn
                                    </h1>
                                    <p className={`text-xs md:text-sm ${t.textPrimary} font-medium mt-0.5`}>Áp dụng từ ngày 4/5/2026</p>
                                </div>
                                <div className="flex items-center gap-2 md:gap-3">
                                    {/* Theme Picker */}
                                    <div className={`hidden sm:flex items-center gap-1.5 p-1 bg-white rounded-full border ${t.borderMid} shadow-inner`}>
                                        {Object.keys(THEMES).map(key => (
                                            <button
                                                key={key}
                                                onClick={() => setCurrentThemeKey(key)}
                                                className={`w-5 h-5 rounded-full transition-all duration-200 ${currentThemeKey === key ? 'scale-125 ring-2 ring-offset-1 ring-gray-300' : 'hover:scale-110 opacity-70 hover:opacity-100'}`}
                                                style={{ backgroundColor: THEMES[key].colorHex }}
                                                title={THEMES[key].name}
                                            />
                                        ))}
                                    </div>
                                    <a 
                                        href="https://tkbnkhoahung.github.io/tkbnk2526hs/" 
                                        className={`p-2.5 ${t.bgLight} ${t.hoverBgLight} rounded-full ${t.textHighlight} transition shadow-sm border ${t.borderLight}`}
                                        title="Về Trang Chủ"
                                    >
                                        <IconHome className="w-5 h-5" />
                                    </a>
                                </div>
                            </div>
                            {/* Mobile Theme Picker */}
                            <div className={`sm:hidden flex justify-center gap-4 py-2.5 bg-white border-t ${t.borderLight}`}>
                                {Object.keys(THEMES).map(key => (
                                    <button
                                        key={key}
                                        onClick={() => setCurrentThemeKey(key)}
                                        className={`w-6 h-6 rounded-full transition-all duration-200 ${currentThemeKey === key ? 'scale-125 ring-2 ring-offset-2 ring-gray-300 shadow-md' : 'opacity-70'}`}
                                        style={{ backgroundColor: THEMES[key].colorHex }}
                                    />
                                ))}
                            </div>
                        </header>

                        <main className="max-w-md md:max-w-3xl mx-auto px-4 mt-6">
                            {/* Khối Thống Kê */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 animate-slide-up" style={{animationDelay: '0.1s', animationFillMode: 'both'}}>
                                <StatCard icon={<IconUsers />} title="Học sinh" value={stats.hs} />
                                <StatCard icon={<IconLayoutGrid />} title="Lớp" value={stats.lop} />
                                <StatCard icon={<IconUser />} title="Giáo viên" value={stats.gv} />
                                <StatCard icon={<IconMapPin />} title="Phòng" value={stats.phong} />
                            </div>

                            {/* Các Tab điều hướng */}
                            <div className="flex overflow-x-auto pb-2 mb-4 gap-2 scrollbar-hide animate-slide-up" style={{animationDelay: '0.2s', animationFillMode: 'both'}}>
                                <TabButton active={activeTab === 'hocsinh'} onClick={() => setActiveTab('hocsinh')} icon={<IconUsers size={18}/>}>Học sinh</TabButton>
                                <TabButton active={activeTab === 'malop'} onClick={() => setActiveTab('malop')} icon={<IconBookOpen size={18}/>}>Mã lớp</TabButton>
                                <TabButton active={activeTab === 'phong'} onClick={() => setActiveTab('phong')} icon={<IconMapPin size={18}/>}>Phòng</TabButton>
                                <TabButton active={activeTab === 'giaovien'} onClick={() => setActiveTab('giaovien')} icon={<IconUser size={18}/>}>Giáo viên</TabButton>
                            </div>

                            {/* Khu vực Tìm Kiếm và Lựa Chọn */}
                            <div className={`bg-white p-4 rounded-[1.5rem] shadow-sm border ${t.borderLight} flex flex-col gap-4 mb-6 transition-colors duration-300 animate-slide-up`} style={{animationDelay: '0.3s', animationFillMode: 'both'}}>
                                <div className="relative">
                                    <IconSearch className={`absolute left-4 top-1/2 transform -translate-y-1/2 ${t.iconLight} w-5 h-5`} />
                                    <input 
                                        type="text" 
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        placeholder={`Tìm kiếm trong ${getActiveList().length} lựa chọn...`}
                                        className={`w-full pl-11 pr-10 py-3 ${t.bgLight} border-none rounded-xl ${t.focusRing} focus:ring-2 ${t.textMain} placeholder-gray-400 outline-none transition`}
                                    />
                                    {searchTerm && (

                                            </span>
                                        </div>
                                        <div className="max-h-48 overflow-y-auto custom-scrollbar">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 pr-2">
                                                {studentsP2.map((hs, idx) => (
                                                    <div key={idx} className={`flex items-center gap-3 py-1.5 px-2 bg-white border ${t.borderLight} rounded-lg shadow-sm hover:border-${t.colorHex} transition-colors`}>
                                                        <Avatar name={hs.ten} />
                                                        <div className="min-w-0">
                                                            <div className={`text-[13px] font-bold ${t.textDark} truncate`}>{hs.ten}</div>
                                                            <div className={`text-[9px] ${t.textLight} font-bold uppercase`}>{hs.lop}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Render ứng dụng vào thẻ div#root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
